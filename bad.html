    <link rel="stylesheet" href="css/bad.css">
    <style>
    :root {
            --tick-gap: calc(10vw + 1em);
            --major-gap: calc(50vw + 5em);
        }

        
        .ruler {
            bottom: 0;
            height: 20px;
            width: 100%;
            position: absolute;

            background-image:

                /* minor ticks */
                repeating-linear-gradient(
                to right,
                black 0px,
                black 1px,
                transparent 1px,
                transparent var(--tick-gap)
                );
        }

        .ruler-major{
            bottom: 0;
            height: 40px;
            width: 100%;
            position: absolute;

            background-image:
                /* major ticks */
                repeating-linear-gradient(
                to right,
                black 0px,
                black 3px,
                transparent 1px,
                transparent var(--major-gap)
                ),
        }
    </style>
</head>
